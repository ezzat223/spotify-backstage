apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: flow-pillar-ai-and-software
  title: Flow Pillar — AI + Software
  description: Scaffold a combined AI + software repo (model + service)
spec:
  owner: flow-pillar
  parameters:
    - title: Project
      required: true
      schema:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
  steps:
    - id: dispatch_generator
      name: Dispatch platform-template-generator workflow
      action: github:workflow-dispatch
      input:
        owner: Finaira1
        repo: platform-template-generator
        workflow_id: generate_repo.yaml
        ref: main
        inputs:
          project_name: "{{ parameters.name }}"
          project_type: "AI - Software"
