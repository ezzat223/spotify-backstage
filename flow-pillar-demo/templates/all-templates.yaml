---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: flow-pillar-ai-and-software
  title: Flow Pillar — AI + Software
  description: Scaffold a combined AI + software repo (model + service)
spec:
  owner: flow-pillar
  parameters:
    - title: Project
      required: true
      schema:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
  steps:
    - id: publish
      name: Create GitHub repository
      action: github:publish
      input:
        owner: ezzat223
        repo: "{{ parameters.name }}"
        description: "Scaffolded by Flow Pillar demo: AI+Software"
        visibility: public
        readmeContents: "# {{ parameters.name }}\nAI + Software scaffold"
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: flow-pillar-ai-only
  title: Flow Pillar — AI-only
  description: Scaffold an AI-only project (model serving)
  tags:
    - flow-pillar
spec:
  owner: flow-pillar
  parameters:
    - title: Project details
      required: true
      schema:
        type: object
        properties:
          name:
            title: Project name
            type: string
          description:
            type: string
  steps:
    - id: publish
      name: Create GitHub repository and push initial files
      action: github:publish
      input:
        owner: ezzat223
        repo: "{{ parameters.name }}"
        description: "Scaffolded by Flow Pillar demo: AI-only"
        visibility: public
        readmeContents: |
          # {{ parameters.name }}
          Scaffolded AI-only project
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: flow-pillar-software-only
  title: Flow Pillar — Software-only
  description: Scaffold a software-only project (library or website)
  tags: [flow-pillar]
spec:
  owner: flow-pillar
  parameters:
    - title: Project details
      required: true
      schema:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
  steps:
    - id: publish
      name: Create GitHub repository
      action: github:publish
      input:
        owner: ezzat223
        repo: "{{ parameters.name }}"
        description: "Scaffolded by Flow Pillar demo: Software-only"
        visibility: public
        readmeContents: "# {{ parameters.name }}\nScaffolded project"
