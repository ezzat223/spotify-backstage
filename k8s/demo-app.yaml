# ============================================================================
# demo-app — Kubernetes manifests
# ============================================================================
#
# A minimal HTTP echo service used to verify the Backstage Kubernetes plugin.
# The `backstage.io/kubernetes-id: demo-app` label links these resources to
# the Backstage component defined in examples/demo-app.yaml.
#
# ── Quick-start commands ────────────────────────────────────────────────────
#
#   Deploy:
#     kubectl apply -f k8s/demo-app.yaml
#
#   Check status:
#     kubectl get deployment,pod,svc -l app.kubernetes.io/name=demo-app
#
#   View logs:
#     kubectl logs -l app.kubernetes.io/name=demo-app --tail=50
#
#   Test locally (port-forward):
#     kubectl port-forward svc/demo-app 8080:80
#     curl http://localhost:8080        # should return "demo-app"
#
#   Scale up/down:
#     kubectl scale deployment demo-app --replicas=3
#
#   Update the image (triggers a rolling update):
#     kubectl set image deployment/demo-app http-echo=hashicorp/http-echo:1.0.0
#
#   Watch rollout progress:
#     kubectl rollout status deployment/demo-app
#
#   Roll back to previous version:
#     kubectl rollout undo deployment/demo-app
#
#   Tear down:
#     kubectl delete -f k8s/demo-app.yaml
#
# ── Backstage integration ───────────────────────────────────────────────────
#
#   After deploying, open Backstage → Catalog → demo-app → Kubernetes tab.
#   You should see the Pod, Deployment, and Service listed there.
#
#   Requirements:
#     - Backstage K8s plugin credentials configured  (./scripts/setup-env.sh)
#     - Backstage running                            (./scripts/start-dev.sh)
#     - Backstage catalog entity registered          (examples/demo-app.yaml)
#
# ── Argo Rollouts upgrade (optional) ───────────────────────────────────────
#
#   To use canary or blue/green deployments instead of a plain Deployment,
#   see k8s/demo-app-rollout.yaml.
#
# ============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app.kubernetes.io/name: demo-app
    backstage.io/kubernetes-id: demo-app   # links this resource to the Backstage component
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app
      backstage.io/kubernetes-id: demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-app
        backstage.io/kubernetes-id: demo-app
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=demo-app"          # text returned by every HTTP request
          ports:
            - containerPort: 8080
          # Resource limits keep the pod from starving the minikube node
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
  labels:
    app.kubernetes.io/name: demo-app
    backstage.io/kubernetes-id: demo-app
spec:
  selector:
    app.kubernetes.io/name: demo-app
    backstage.io/kubernetes-id: demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80           # port exposed inside the cluster
      targetPort: 8080   # port the container listens on
  type: ClusterIP        # internal only; use port-forward to reach it locally
